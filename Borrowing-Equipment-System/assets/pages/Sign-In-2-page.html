<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsEQ</title>
<link rel="stylesheet" href="/assets/styles/Sign-In.css">
</head>
<body>
<main>
    <div>
        <input type="checkbox" id="toggle"> 

       <div class="contain">   
            
           <form action="Log-In-page.html" class="form sign-in">
               
                <h2>Sign Up</h2>
                <input type="email" placeholder="Wmsu Email" required>

                <input type="text" placeholder="Occupation" required>

                <input type="text" placeholder="College Department" required>

                <input type="text" placeholder="Department Office" required>

                <input type="text" placeholder="Name" required>

                <input type="text" placeholder="Id Number" required>

                <input type="password" placeholder="Password" required> 

                <input type="password" placeholder="Confirm Password" required>

                <button type="submit"><a href="">Sign Up</a></button>
                <label for="toggle" class="switch">
                <p>Already have an account?<a href="Log-In-page.html"> Login</a> </p>
                </label>

            </form> 
        </div>
    </div>
</main>
</body>
</html>
