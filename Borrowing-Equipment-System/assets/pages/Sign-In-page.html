<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsEQ</title>
<link rel="stylesheet" href="/assets/styles/Sign-In.css">
</head>
<body>
<main>
    <div>
        <input type="checkbox" id="toggle"> 

       <div class="contain" >   
            
           <form action="Log-In-page.html" class="form sign-in" id="sign-in">
               
                <h2>Sign Up</h2>
                <input type="email" placeholder="Wmsu Email" >
                <input type="text" placeholder="Occupation" >
                <input type="text" placeholder="College Department" >
                <input type="text" placeholder="Course" >
                <input type="text" placeholder="Name" >
                <input type="text" placeholder="Adviser Name" >
                <input type="text" placeholder="Student ID" >
                <input type="password" placeholder="Password" > 
                <input type="password" placeholder="Confirm Password" >
                <button type="submit">Sign Up</button>
                <label for="toggle" class="switch">
                <p>Already have an account?<a href="Log-In-page.html"> Login</a></p> 
                </label>

            </form> 
        </div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
