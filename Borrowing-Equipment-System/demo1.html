<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiosk UI</title>

<style>
:root {
  --dark: #1a1a1a;
  --gold: #D4AF37;
  --light: #f5f5f0;
  --coal: #333;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: var(--dark);
  color: var(--light);
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  border-bottom: 1px solid var(--coal);
}

.logo {
  font-size: 24px;
  font-weight: bold;
  color: var(--gold);
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: var(--light);
  transition: 0.3s;
}

nav a:hover {
  color: var(--gold);
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h1 {
  font-size: 48px;
  color: var(--gold);
}

.hero p {
  margin-top: 10px;
  color: #ccc;
}

/* MENU GRID */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 40px;
}

.card {
  background: var(--coal);
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.card-content h3 {
  color: var(--gold);
}

.card-content p {
  font-size: 14px;
  color: #ccc;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  background: var(--gold);
  color: var(--dark);
  cursor: pointer;
  border-radius: 5px;
}

/* CART */
.cart {
  position: fixed;
  right: 0;
  top: 0;
  width: 300px;
  height: 100%;
  background: var(--coal);
  padding: 20px;
  overflow-y: auto;
  border-left: 2px solid var(--gold);
}

.cart h2 {
  color: var(--gold);
  margin-bottom: 15px;
}

.cart-item {
  margin-bottom: 10px;
  border-bottom: 1px solid #555;
  padding-bottom: 5px;
}

.total {
  margin-top: 15px;
  font-weight: bold;
  color: var(--gold);
}

/* RESPONSIVE */
@media(max-width: 768px) {
  .cart {
    width: 100%;
    height: 250px;
    bottom: 0;
    top: auto;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">Kiosk</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Menu</a>
    <a href="#">Cart</a>
  </nav>
</header>

<section class="hero">
  <h1>Welcome</h1>
  <p>Select your favorite meal</p>
</section>

<section class="menu" id="menu">
</section>

<div class="cart">
  <h2>Your Order</h2>
  <div id="cart-items"></div>
  <div class="total">Total: ₱<span id="total">0</span></div>
</div>

<script>
const menuData = [
  {name: "Burger", price: 120, img: "https://picsum.photos/300/200?1"},
  {name: "Fries", price: 80, img: "https://picsum.photos/300/200?2"},
  {name: "Pizza", price: 250, img: "https://picsum.photos/300/200?3"},
  {name: "Drink", price: 50, img: "https://picsum.photos/300/200?4"},
];

const menu = document.getElementById("menu");
const cartItems = document.getElementById("cart-items");
const totalDisplay = document.getElementById("total");

let cart = [];

/* LOAD MENU */
menuData.forEach((item, index) => {
  const card = document.createElement("div");
  card.classList.add("card");

  card.innerHTML = `
    <img src="${item.img}">
    <div class="card-content">
      <h3>${item.name}</h3>
      <p>₱${item.price}</p>
      <button class="btn" onclick="addToCart(${index})">Add</button>
    </div>
  `;

  menu.appendChild(card);
});

/* ADD TO CART */
function addToCart(index) {
  cart.push(menuData[index]);
  renderCart();
}

/* RENDER CART */
function renderCart() {
  cartItems.innerHTML = "";
  let total = 0;

  cart.forEach(item => {
    total += item.price;

    const div = document.createElement("div");
    div.classList.add("cart-item");
    div.innerText = `${item.name} - ₱${item.price}`;

    cartItems.appendChild(div);
  });

  totalDisplay.innerText = total;
}
</script>

</body>
</html>
