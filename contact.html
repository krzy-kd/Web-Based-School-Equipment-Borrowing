<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - School Equipment System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="home.html" class="logo">School Equipment</a>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="help.html">Help</a></li>
            </ul>
        </div>
    </nav>

    <!-- Contact Form -->
    <div class="container">
         <h1 class="page-title">Contact Us</h1>

         <div class="info-content">
            <h3>Contact Information</h3>
            <p><strong>Phone:</strong> 0987 654 3789</p>
            <p><strong>Email:</strong> schoolequip@school.edu</p>
            <p><strong>address:</strong> School Sports Department</p>
         </div>

         <div class="form-container" style="margin-top: 30px;">
            <h2 class="page-title">Send Message</h2>
            <form action="login.html">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message"  name="message" rows="5" required>
                    </textarea>
                </div>

                <button type="submit" class="btn-submit">Send Message</button>
            </form>
         </div>
    </div>
