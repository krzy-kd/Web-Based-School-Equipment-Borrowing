<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Profile</title>
    <link rel="stylesheet" href="Account-design.css">

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f0; 
            margin: 0;
            color: #333; 
        }

        nav {
            background: #1a1a1a; 
            padding: 15px;
            color: #D4AF37; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #D4AF37;
        }

        nav a {
            color: #D4AF37; 
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        .account-container {
            width: 900px;
            margin: 40px auto;
            background: #f5f5f0; 
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            color: #333; 
        }

        .profile {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .profile img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-right: 20px;
            border: 2px solid #D4AF37;
        }

        .info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .info div {
            background: #fff; 
            color: #333; 
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .buttons {
            margin-bottom: 10px; /* Reduced margin since table is gone */
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        button a {
            color: inherit;
            text-decoration: none;
        }

        button:hover {
            opacity: 0.85;
        }

        .edit {
            background: #D4AF37;
            color: #1a1a1a; 
        }

        .logout {
            background: #333; 
            color: #f5f5f0; 
        }
    </style>
</head>
<body>

<nav>
    <h2>Borrowing System</h2>
    <div>
        <a href="#">Dashboard</a>
        <a href="Equiment-design1.html">Equipment</a>
        <a href="#">Account</a>
    </div>
</nav>

<div class="account-container">

    <div class="profile">
        <img src="https://via.placeholder.com/80">
        <div>
            <h2>Joshua Patricio</h2>
            <p>Student User</p>
        </div>
    </div>

    <div class="info">
        <div><strong>Email:</strong><br> joshua@email.com</div>
        <div><strong>Student ID:</strong><br> 2025-1234</div>
        <div><strong>Department:</strong><br> IT Department</div>
        <div><strong>Account Type:</strong><br> Borrower</div>
    </div>

    <div class="buttons">
        <button class="edit">Edit Profile</button>
        <button class="logout"><a href="Project-Test-1.html">Logout</a></button>
    </div>

</div>

</body>
</html>
