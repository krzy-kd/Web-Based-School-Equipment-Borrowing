<!DOCTYPE html>

<div class="content">

<h1>Borrow History</h1>

<table id="historyTable"></table>

</div>

<script>

let history=JSON.parse(localStorage.getItem("history"))||[]

let table=document.getElementById("historyTable")

history.forEach(h=>{
    let row=`<tr>
<td>${h.item}</td>
<td>${h.date}</td>
<td>${h.status}</td>
</tr>`



table.innerHTML+=row

})

</script>

</body>
</html>
